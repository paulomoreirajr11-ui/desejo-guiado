name: keepalive
# Mantém o app acordado (evita o "cold start" de ~50s do plano free do Render).
# Roda no GitHub (grátis em repo público). Cutuca o app a cada 10 min.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Desejo Guiado
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://desejo-guiado.onrender.com/estudio/celular.html || echo "000")
          echo "ping -> HTTP $code"
