<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Um look pra você — Irene Moreira</title>
<meta name="theme-color" content="#FAF6EE">
<meta property="og:title" content="Um look pra você 💛">
<meta property="og:description" content="Sua consultora da Irene Moreira mirou um look pensando em você.">
<meta property="og:image" content="https://desejo-guiado.onrender.com/estudio/og-card.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
 :root{--gold:#B0872E;--gold2:#8C6B22;--ink:#FAF6EE;--panel:#FFFFFF;--panel2:#F1EADB;--off:#1E1A15;--mut:#897F6F;--line:rgba(40,32,18,.14);}
 *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
 body{margin:0;background:var(--ink);color:var(--off);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
 header{display:flex;flex-direction:column;align-items:center;gap:5px;padding:18px 16px 2px;}
 header img{height:42px;width:auto;display:block;}
 .tag{font-size:8.5px;letter-spacing:3px;color:var(--mut);text-transform:uppercase;}
 .wrap{width:100%;max-width:460px;padding:6px 16px 40px;display:flex;flex-direction:column;align-items:center;}
 .hello{font-family:'Fraunces';font-weight:500;font-size:21px;text-align:center;line-height:1.3;margin:8px 0 14px;}
 .hello small{display:block;font-family:'Inter';font-size:13px;color:var(--mut);font-weight:400;margin-top:7px;letter-spacing:.2px;line-height:1.5;}
 .look{width:100%;border-radius:20px;overflow:hidden;background:var(--panel2);border:1px solid var(--line);box-shadow:0 16px 40px rgba(40,32,18,.14);animation:rise .7s ease-out;}
 @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
 .look img{width:100%;display:block;}
 .hint{font-size:12px;color:var(--mut);margin:12px 0 4px;text-align:center;letter-spacing:.2px;}
 .ask{font-family:'Fraunces';font-style:italic;font-size:17px;color:var(--off);text-align:center;margin:22px 0 14px;}
 .btns{width:100%;display:flex;flex-direction:column;gap:9px;}
 .rb{display:flex;align-items:center;gap:12px;width:100%;padding:15px 17px;border:1px solid var(--line);background:var(--panel);color:var(--off);border-radius:14px;font-size:16px;font-weight:500;font-family:inherit;cursor:pointer;text-align:left;transition:transform .08s ease,border-color .2s,opacity .35s,background .2s;}
 .rb:active{transform:scale(.985);}
 .rb .em{font-size:20px;width:24px;text-align:center;}
 .rb.faded{opacity:.32;}
 .rb.chosen{border-color:var(--gold);background:#FBF6EA;}
 .done{width:100%;text-align:center;padding:8px 0 0;animation:rise .5s ease-out;}
 .done .dt{font-family:'Fraunces';font-weight:500;font-size:22px;color:var(--off);}
 .done .ds{font-size:13.5px;color:var(--mut);margin-top:8px;line-height:1.5;}
 .state{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;color:var(--mut);padding:20px;}
 .spin{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:sp 1s linear infinite;}
 @keyframes sp{to{transform:rotate(360deg);}}
 .foot{font-family:'Fraunces';font-size:11px;color:var(--mut);letter-spacing:4px;margin-top:26px;text-transform:uppercase;}
</style>
</head>
<body>
<header>
 <img src="logo.png" alt="Irene Moreira" onerror="this.style.display='none'">
 <div class="tag">Desejo Guiado</div>
</header>
<div id="app" class="wrap">
 <div class="state"><div class="spin"></div><div>Carregando seu look…</div></div>
</div>
<script>
 var P=new URLSearchParams(location.search), ID=P.get('id')||'';
 var app=document.getElementById('app');
 var TECLAS=[
   {k:'Acertou em mim', em:'💚', msg:'Que alegria!'},
   {k:'Quero provar',  em:'🛍️', msg:'Anotado com carinho!'},
   {k:'Mira de novo',  em:'🔄', msg:'Combinado!'},
   {k:'Não foi dessa', em:'🤍', msg:'Obrigada pela sinceridade!'}
 ];
 function esc(s){return (s||'').replace(/[<>&"]/g,function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c];});}
 function err(m){app.innerHTML='<div class="state"><div style="font-size:38px">🤍</div><div>'+esc(m)+'</div><div class="foot">Irene Moreira</div></div>';}
 var LOOK=null;
 function render(look){
   LOOK=look;
   var nome=look.cliente?esc(look.cliente):'';
   var vend=look.vend?esc(look.vend):'sua consultora';
   var hello = nome ? ('Oi, '+nome+' 💛') : 'Um look pra você 💛';
   var sub = vend+' escolheu este look pensando em você.';
   var btns=TECLAS.map(function(t,i){return '<button class="rb" data-i="'+i+'"><span class="em">'+t.em+'</span> '+t.k+'</button>';}).join('');
   app.innerHTML='<div class="hello">'+hello+'<small>'+sub+'</small></div>'
     +'<div class="look"><img src="'+esc(look.img)+'" alt="look"></div>'
     +'<div class="hint">toque e segure a foto para guardar 💛</div>'
     +'<div id="zone"><div class="ask">o que você achou?</div><div class="btns" id="btns">'+btns+'</div></div>'
     +'<div class="foot">Irene Moreira</div>';
   Array.prototype.forEach.call(document.querySelectorAll('.rb'), function(b){
     b.onclick=function(){ react(TECLAS[+b.getAttribute('data-i')]); };
   });
 }
 function react(t){
   // a IMAGEM PERMANECE. Só a área de resposta vira um agradecimento delicado.
   var nome=LOOK&&LOOK.cliente?(', '+esc(LOOK.cliente)):'';
   var zone=document.getElementById('zone');
   if(zone){zone.innerHTML='<div class="done"><div class="dt">'+esc(t.msg)+' 💛</div><div class="ds">Sua resposta chegou pra '+(LOOK&&LOOK.vend?esc(LOOK.vend):'sua consultora')+'. Pode guardar a foto à vontade.</div></div>';}
   try{ fetch('/reacao',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:ID,reacao:t.k})}); }catch(e){}
 }
 if(!ID){ err('Link inválido. Peça um novo para sua consultora.'); }
 else{
   fetch('/look?id='+encodeURIComponent(ID)).then(function(r){return r.json();}).then(function(d){
     if(!d || d.error || !d.img){ err('Look não encontrado. Peça um novo link.'); return; }
     render(d);
   }).catch(function(){ err('Não consegui carregar agora. Tente de novo em instantes.'); });
 }
</script>
</body>
</html>
