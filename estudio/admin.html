<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#FAF6EE">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="&#10240;">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<title>Desejo Guiado</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--gold:#B0872E;--gold2:#8C6B22;--ink:#FAF6EE;--panel:#FFFFFF;--panel2:#F1EADB;--off:#1E1A15;--mut:#897F6F;--line:rgba(40,32,18,.14);}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--ink);color:var(--off);font-family:'Inter',sans-serif;}
  header{display:flex;align-items:center;gap:12px;padding:14px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(250,246,238,.9);backdrop-filter:blur(8px);z-index:5;flex-wrap:wrap;}
  .mono{font-family:'Fraunces';font-weight:500;font-size:34px;line-height:1;}
  .brand{display:flex;flex-direction:column;line-height:1;}
  .bwm{font-family:'Fraunces';font-weight:500;font-size:16px;letter-spacing:4px;}
  .btag{font-size:9px;letter-spacing:2.5px;color:var(--mut);text-transform:uppercase;margin-top:3px;}
  @keyframes goldshine{to{background-position:200% center;}}
  .gold-metal{background:linear-gradient(100deg,#7A5E1E 0%,#B0872E 18%,#EBD18A 36%,#FBF1CE 44%,#C7A34A 54%,#8C6B22 72%,#E8CE86 100%);background-size:220% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;animation:goldshine 6s linear infinite;}
  nav{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  nav a{font-size:13px;color:var(--mut);text-decoration:none;border:1px solid var(--line);border-radius:20px;padding:8px 16px;}
  .btn{font-size:12px;color:var(--gold2);border:1px solid var(--line);border-radius:18px;padding:8px 14px;background:transparent;cursor:pointer;font-family:inherit;}
  .wrap{max-width:1100px;margin:0 auto;padding:18px;}
  h2.sec{font-family:'Fraunces';font-weight:500;font-size:18px;margin:22px 0 12px;}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;}
  .stat .n{font-family:'Fraunces';font-size:30px;color:var(--gold2);line-height:1;}
  .stat .l{font-size:12px;color:var(--mut);margin-top:6px;}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  th,td{text-align:left;padding:11px 14px;font-size:13px;border-bottom:1px solid var(--line);}
  th{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);font-weight:500;}
  tr:last-child td{border-bottom:none;}
  td .v{font-weight:500;}
  .atfeed{display:flex;flex-direction:column;gap:6px;}
  .atrow{display:flex;gap:10px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:13px;}
  .atrow .who{font-weight:500;min-width:92px;}
  .atrow .when{margin-left:auto;color:var(--mut);font-size:12px;white-space:nowrap;}
  .clubegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
  .ctile{background:var(--panel2);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .ctile img{width:100%;height:150px;object-fit:cover;display:block;}
  .ctile .nm{font-size:11px;padding:6px 8px;color:var(--mut);line-height:1.3;}
  .empty{color:var(--mut);font-size:13px;padding:14px;border:1px dashed var(--line);border-radius:12px;}
</style>
</head>
<body>
<header>
  <div class="mono gold-metal">M</div>
  <div class="brand"><div class="bwm gold-metal">IRENE MOREIRA</div><div class="btag">Desejo Guiado</div></div>
  <nav>
    <a href="index.html">InĂ­cio</a>
    <a href="estudio.html">EstĂşdio</a>
    <a href="clube.html">Clube</a>
    <button class="btn" id="reload">â†» atualizar</button>
  </nav>
</header>
<div class="wrap">
  <div class="cards" id="stats"></div>
  <h2 class="sec">Por vendedora</h2>
  <div id="porvend"></div>
  <h2 class="sec">ReaĂ§Ăµes das clientes</h2>
  <div class="atfeed" id="reacoes"></div>
  <h2 class="sec">Reservas no provador</h2>
  <div class="atfeed" id="reservas"></div>
  <h2 class="sec">Travas de acesso (aparelhos)</h2>
  <div class="atfeed" id="travas"></div>
  <h2 class="sec">Atividade recente</h2>
  <div class="atfeed" id="atfeed"></div>
  <h2 class="sec">Clube â€” posts</h2>
  <div class="clubegrid" id="clube"></div>
</div>
<script>
function hoje(){return new Date().toISOString().slice(0,10);}
function fmt(ts){if(!ts)return '';return ts.replace('T',' ').slice(0,16);}
function pecasTxt(p){return Array.isArray(p)?p.join(' + '):(p||'');}
function card(n,l){return '<div class="stat"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';}
async function carregar(){
  let log=[],posts=[];
  try{log=(await (await fetch('/uso')).json()).log||[];}catch(e){}
  try{posts=(await (await fetch('/clube')).json()).posts||[];}catch(e){}
  let reservas=[]; try{reservas=(await (await fetch('/reserva')).json()).reservas||[];}catch(e){}
  let looks={}; try{looks=(await (await fetch('/look')).json()).looks||{};}catch(e){}
  let claims={}; try{claims=(await (await fetch('/claim')).json()).claims||{};}catch(e){}
  const today=hoje(), vends={};
  log.forEach(e=>{const v=e.vend||'(sem nome)';vends[v]=vends[v]||{total:0,hoje:0,last:'',cli:''};vends[v].total++;if((e.ts||'').slice(0,10)===today)vends[v].hoje++;if((e.ts||'')>vends[v].last){vends[v].last=e.ts||'';vends[v].cli=e.cliente||'';}});
  const hojeLooks=log.filter(e=>(e.ts||'').slice(0,10)===today).length;
  var lkArr=Object.keys(looks).map(function(k){return looks[k];});
  var qAcertou=lkArr.filter(function(l){return l&&l.reacao==='Acertou em mim';}).length;
  document.getElementById('stats').innerHTML=card(log.length,'looks gerados (total)')+card(hojeLooks,'looks hoje')+card(Object.keys(vends).length,'vendedoras ativas')+card(qAcertou,'acertou em mim đź’š')+card(posts.length,'posts no clube');
  const rows=Object.entries(vends).sort((a,b)=>b[1].total-a[1].total).map(([v,d])=>'<tr><td class="v">'+v+'</td><td>'+d.total+'</td><td>'+d.hoje+'</td><td>'+(d.cli||'â€”')+'</td><td>'+fmt(d.last)+'</td></tr>').join('');
  document.getElementById('porvend').innerHTML=rows?('<table><tr><th>Vendedora</th><th>Total</th><th>Hoje</th><th>Ăšltima cliente</th><th>Ăšltima atividade</th></tr>'+rows+'</table>'):'<div class="empty">Nenhum look gerado ainda. Quando as vendedoras gerarem, aparece aqui.</div>';
  const rec=log.slice(-30).reverse();
  document.getElementById('atfeed').innerHTML=rec.length?rec.map(e=>'<div class="atrow"><span class="who">'+(e.vend||'?')+'</span><span>'+(e.cliente||'cliente')+' Â· '+pecasTxt(e.pecas)+' Â· '+(e.ocasiao||'')+(e.fundo==='estudio'?' Â· estĂşdio':'')+'</span><span class="when">'+fmt(e.ts)+'</span></div>').join(''):'<div class="empty">Sem atividade ainda.</div>';
  const cp=posts.slice().reverse();
  document.getElementById('clube').innerHTML=cp.length?cp.map(p=>'<div class="ctile"><img src="'+p.img+'"><div class="nm">'+(p.marca?p.marca+' Â· ':'')+(p.desc||p.occ||'look')+(p.por?' Â· R$'+p.por:'')+(p.vend?' Â· '+p.vend:'')+'</div></div>').join(''):'<div class="empty">Nada no clube ainda.</div>';
  var rv=reservas.slice().reverse();
  document.getElementById('reservas').innerHTML=rv.length?rv.map(function(r){return '<div class="atrow"><span class="who">'+(r.cliente||'cliente')+'</span><span>'+(Array.isArray(r.pecas)?r.pecas.join(' + '):'')+(r.preco?' Â· R$'+r.preco:'')+(r.vend?' Â· '+r.vend:'')+'</span><span class="when">'+fmt(r.ts)+'</span></div>';}).join(''):'<div class="empty">Nenhuma reserva ainda. Quando a vendedora reservar um look, aparece aqui.</div>';
  var EMO={'Acertou em mim':'đź’š','Quero provar':'đź›Ťď¸Ź','Mira de novo':'đź”„','NĂŁo foi dessa':'đź¤Ť'};
  var lk=lkArr.filter(function(l){return l&&l.reacao;});
  lk.sort(function(a,b){return (b.reacao_ts||b.ts||'').localeCompare(a.reacao_ts||a.ts||'');});
  document.getElementById('reacoes').innerHTML=lk.length?lk.map(function(l){return '<div class="atrow"><span class="who">'+(EMO[l.reacao]||'â€˘')+' '+(l.cliente||'cliente')+'</span><span><b>'+(l.reacao||'')+'</b>'+(Array.isArray(l.pecas)&&l.pecas.length?' Â· '+l.pecas.join(' + '):'')+(l.vend?' Â· '+l.vend:'')+'</span><span class="when">'+fmt(l.reacao_ts||l.ts)+'</span></div>';}).join(''):'<div class="empty">Nenhuma reaĂ§ĂŁo ainda. Quando a cliente tocar uma tecla no look enviado, aparece aqui.</div>';
  var ck=Object.keys(claims);
  document.getElementById('travas').innerHTML=ck.length?ck.map(function(v){return '<div class="atrow"><span class="who">đź”’ '+v+'</span><span>aparelho registrado</span><span class="when">'+fmt(claims[v].ts)+' <button class="btn liberar" data-v="'+v+'" style="margin-left:8px;">Liberar</button></span></div>';}).join(''):'<div class="empty">Nenhum aparelho travado ainda. Quando a vendedora abrir o link dela, o celular fica registrado aqui.</div>';
  document.querySelectorAll('.liberar').forEach(function(b){b.onclick=async function(){if(!confirm('Liberar '+b.dataset.v+'? Ela poderĂˇ registrar um novo celular ao abrir o link de novo.'))return;try{await fetch('/claim/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({vend:b.dataset.v})});}catch(e){}carregar();};});
}
document.getElementById('reload').onclick=carregar;
carregar();
</script>
</body>
</html>
