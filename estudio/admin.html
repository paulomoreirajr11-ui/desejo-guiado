<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#FAF6EE">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="&#10240;">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<title>Desejo Guiado</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--gold:#B0872E;--gold2:#8C6B22;--ink:#FAF6EE;--panel:#FFFFFF;--panel2:#F1EADB;--off:#1E1A15;--mut:#897F6F;--line:rgba(40,32,18,.14);}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--ink);color:var(--off);font-family:'Inter',sans-serif;}
  header{display:flex;align-items:center;gap:12px;padding:14px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(250,246,238,.9);backdrop-filter:blur(8px);z-index:5;flex-wrap:wrap;}
  .mono{font-family:'Fraunces';font-weight:500;font-size:34px;line-height:1;}
  .brand{display:flex;flex-direction:column;line-height:1;}
  .bwm{font-family:'Fraunces';font-weight:500;font-size:16px;letter-spacing:4px;}
  .btag{font-size:9px;letter-spacing:2.5px;color:var(--mut);text-transform:uppercase;margin-top:3px;}
  @keyframes goldshine{to{background-position:200% center;}}
  .gold-metal{background:linear-gradient(100deg,#7A5E1E 0%,#B0872E 18%,#EBD18A 36%,#FBF1CE 44%,#C7A34A 54%,#8C6B22 72%,#E8CE86 100%);background-size:220% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;animation:goldshine 6s linear infinite;}
  nav{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  nav a{font-size:13px;color:var(--mut);text-decoration:none;border:1px solid var(--line);border-radius:20px;padding:8px 16px;}
  .btn{font-size:12px;color:var(--gold2);border:1px solid var(--line);border-radius:18px;padding:8px 14px;background:transparent;cursor:pointer;font-family:inherit;}
  .wrap{max-width:1100px;margin:0 auto;padding:18px;}
  h2.sec{font-family:'Fraunces';font-weight:500;font-size:18px;margin:22px 0 12px;}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;}
  .stat .n{font-family:'Fraunces';font-size:30px;color:var(--gold2);line-height:1;}
  .stat .l{font-size:12px;color:var(--mut);margin-top:6px;}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  th,td{text-align:left;padding:11px 14px;font-size:13px;border-bottom:1px solid var(--line);}
  th{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);font-weight:500;}
  tr:last-child td{border-bottom:none;}
  td .v{font-weight:500;}
  .atfeed{display:flex;flex-direction:column;gap:6px;}
  .atrow{display:flex;gap:10px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:13px;}
  .atrow .who{font-weight:500;min-width:92px;}
  .atrow .when{margin-left:auto;color:var(--mut);font-size:12px;white-space:nowrap;}
  .clubegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
  .ctile{background:var(--panel2);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .ctile img{width:100%;height:150px;object-fit:cover;display:block;}
  .ctile .nm{font-size:11px;padding:6px 8px;color:var(--mut);line-height:1.3;}
  .empty{color:var(--mut);font-size:13px;padding:14px;border:1px dashed var(--line);border-radius:12px;}
  .ficgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
  .ficard{display:flex;gap:11px;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:11px;}
  .ficard img{width:66px;height:88px;object-fit:cover;border-radius:9px;flex-shrink:0;background:var(--panel2);}
  .ficnoimg{width:66px;height:88px;border-radius:9px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--mut);text-align:center;flex-shrink:0;line-height:1.2;}
  .ficbody{flex:1;min-width:0;}
  .ficnome{font-family:'Fraunces';font-size:15px;color:var(--off);}
  .ficvend{font-size:11px;color:var(--gold2);margin:1px 0 6px;}
  .ficmeta{font-size:12px;color:var(--mut);margin-top:2px;}
  .ficnota{font-size:12px;color:var(--off);margin-top:5px;line-height:1.35;}
</style>
</head>
<body>
<header>
  <div class="mono gold-metal">M</div>
  <div class="brand"><div class="bwm gold-metal">IRENE MOREIRA</div><div class="btag">Desejo Guiado</div></div>
  <nav>
    <a href="index.html">Início</a>
    <a href="estudio.html">Estúdio</a>
    <a href="clube.html">Clube</a>
    <button class="btn" id="reload">↻ atualizar</button>
  </nav>
</header>
<div class="wrap">
  <div class="cards" id="stats"></div>
  <h2 class="sec">Por vendedora</h2>
  <div id="porvend"></div>
  <h2 class="sec">Clientes (fichas) por vendedora</h2>
  <input id="buscacli" placeholder="🔍 Buscar por vendedora ou cliente" style="width:100%;max-width:420px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:14px;margin-bottom:10px;background:var(--panel);color:var(--off);">
  <div id="fichas"></div>
  <h2 class="sec">💚 Gosto agregado — o que a clientela ama</h2>
  <div class="cards" id="gostostats"></div>
  <div id="gostobody" style="margin-top:14px;"></div>
  <h2 class="sec">Reações das clientes</h2>
  <div class="atfeed" id="reacoes"></div>
  <h2 class="sec">Reservas no provador</h2>
  <div class="atfeed" id="reservas"></div>
  <h2 class="sec">Travas de acesso (aparelhos)</h2>
  <div class="atfeed" id="travas"></div>
  <h2 class="sec">Atividade recente</h2>
  <div class="atfeed" id="atfeed"></div>
  <h2 class="sec">Clube — posts</h2>
  <div class="clubegrid" id="clube"></div>
</div>
<script>
(function(){var PIN='2144';try{if(localStorage.getItem('mira_admin_ok')==='1')return;}catch(e){}var t=null;try{t=prompt('🔒 PIN do administrador:');}catch(e){}if(t===PIN){try{localStorage.setItem('mira_admin_ok','1');}catch(e){}return;}document.body.innerHTML='<div style="text-align:center"><div style="font-size:42px">🔒</div><h2 style="font-family:Fraunces,Georgia,serif;color:#1E1A15;margin:10px 0 4px">Acesso restrito</h2><p style="color:#897F6F">Esta área é só do administrador.</p></div>';document.body.style.cssText='margin:0;font-family:Inter,sans-serif;background:#FAF6EE;display:flex;align-items:center;justify-content:center;height:100vh';throw new Error('admin locked');})();
function hoje(){return new Date().toISOString().slice(0,10);}
function fmt(ts){if(!ts)return '';return ts.replace('T',' ').slice(0,16);}
function pecasTxt(p){return Array.isArray(p)?p.join(' + '):(p||'');}
function card(n,l){return '<div class="stat"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';}
async function carregar(){
  let log=[],posts=[];
  try{log=(await (await fetch('/uso')).json()).log||[];}catch(e){}
  try{posts=(await (await fetch('/clube')).json()).posts||[];}catch(e){}
  let reservas=[]; try{reservas=(await (await fetch('/reserva')).json()).reservas||[];}catch(e){}
  let looks={}; try{looks=(await (await fetch('/look')).json()).looks||{};}catch(e){}
  let claims={}; try{claims=(await (await fetch('/claim')).json()).claims||{};}catch(e){}
  let fichas=[]; try{fichas=(await (await fetch('/ficha')).json()).fichas||[];}catch(e){}window._fichas=fichas;renderFichas((document.getElementById('buscacli')||{}).value||'');
  const today=hoje(), vends={};
  log.forEach(e=>{const v=e.vend||'(sem nome)';vends[v]=vends[v]||{total:0,hoje:0,last:'',cli:''};vends[v].total++;if((e.ts||'').slice(0,10)===today)vends[v].hoje++;if((e.ts||'')>vends[v].last){vends[v].last=e.ts||'';vends[v].cli=e.cliente||'';}});
  const hojeLooks=log.filter(e=>(e.ts||'').slice(0,10)===today).length;
  var lkArr=Object.keys(looks).map(function(k){return looks[k];});
  var qAcertou=lkArr.filter(function(l){return l&&l.reacao==='Acertou em mim';}).length;
  document.getElementById('stats').innerHTML=card(log.length,'looks gerados (total)')+card(hojeLooks,'looks hoje')+card(Object.keys(vends).length,'vendedoras ativas')+card(qAcertou,'acertou em mim 💚')+card(posts.length,'posts no clube');
  const rows=Object.entries(vends).sort((a,b)=>b[1].total-a[1].total).map(([v,d])=>'<tr><td class="v">'+v+'</td><td>'+d.total+'</td><td>'+d.hoje+'</td><td>'+(d.cli||'—')+'</td><td>'+fmt(d.last)+'</td></tr>').join('');
  document.getElementById('porvend').innerHTML=rows?('<table><tr><th>Vendedora</th><th>Total</th><th>Hoje</th><th>Última cliente</th><th>Última atividade</th></tr>'+rows+'</table>'):'<div class="empty">Nenhum look gerado ainda. Quando as vendedoras gerarem, aparece aqui.</div>';
  const rec=log.slice(-30).reverse();
  document.getElementById('atfeed').innerHTML=rec.length?rec.map(e=>'<div class="atrow"><span class="who">'+(e.vend||'?')+'</span><span>'+(e.cliente||'cliente')+' · '+pecasTxt(e.pecas)+' · '+(e.ocasiao||'')+(e.fundo==='estudio'?' · estúdio':'')+'</span><span class="when">'+fmt(e.ts)+'</span></div>').join(''):'<div class="empty">Sem atividade ainda.</div>';
  const cp=posts.slice().reverse();
  document.getElementById('clube').innerHTML=cp.length?cp.map(p=>'<div class="ctile"><img src="'+p.img+'"><div class="nm">'+(p.marca?p.marca+' · ':'')+(p.desc||p.occ||'look')+(p.por?' · R$'+p.por:'')+(p.vend?' · '+p.vend:'')+'</div></div>').join(''):'<div class="empty">Nada no clube ainda.</div>';
  var rv=reservas.slice().reverse();
  document.getElementById('reservas').innerHTML=rv.length?rv.map(function(r){return '<div class="atrow"><span class="who">'+(r.cliente||'cliente')+'</span><span>'+(Array.isArray(r.pecas)?r.pecas.join(' + '):'')+(r.preco?' · R$'+r.preco:'')+(r.vend?' · '+r.vend:'')+'</span><span class="when">'+fmt(r.ts)+'</span></div>';}).join(''):'<div class="empty">Nenhuma reserva ainda. Quando a vendedora reservar um look, aparece aqui.</div>';
  var EMO={'Acertou em mim':'💚','Quero provar':'🛍️','Mira de novo':'🔄','Não foi dessa':'🤍'};
  var lk=lkArr.filter(function(l){return l&&l.reacao;});
  lk.sort(function(a,b){return (b.reacao_ts||b.ts||'').localeCompare(a.reacao_ts||a.ts||'');});
  document.getElementById('reacoes').innerHTML=lk.length?lk.map(function(l){return '<div class="atrow"><span class="who">'+(EMO[l.reacao]||'•')+' '+(l.cliente||'cliente')+'</span><span><b>'+(l.reacao||'')+'</b>'+(Array.isArray(l.pecas)&&l.pecas.length?' · '+l.pecas.join(' + '):'')+(l.vend?' · '+l.vend:'')+'</span><span class="when">'+fmt(l.reacao_ts||l.ts)+'</span></div>';}).join(''):'<div class="empty">Nenhuma reação ainda. Quando a cliente tocar uma tecla no look enviado, aparece aqui.</div>';
  // 3o tijolo - gosto agregado da clientela
  var amadas={},occGer={},rcount={},ocFic={};
  lkArr.forEach(function(l){if(!l)return;if(l.reacao){rcount[l.reacao]=(rcount[l.reacao]||0)+1;if(l.reacao==='Acertou em mim'||l.reacao==='Quero provar'){(Array.isArray(l.pecas)?l.pecas:[]).forEach(function(p){if(p)amadas[p]=(amadas[p]||0)+1;});}}});
  log.forEach(function(e){var o=(e.ocasiao||'').trim();if(o)occGer[o]=(occGer[o]||0)+1;});
  fichas.forEach(function(f){(''+(f.ocasioes||'')).split(',').forEach(function(o){o=o.trim();if(o)ocFic[o]=(ocFic[o]||0)+1;});});
  var topAma=Object.entries(amadas).sort(function(a,b){return b[1]-a[1];}).slice(0,12);
  var topOcc=Object.entries(occGer).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  var topFic=Object.entries(ocFic).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  var totReac=Object.keys(rcount).reduce(function(s,k){return s+rcount[k];},0);
  var totPos=(rcount['Acertou em mim']||0)+(rcount['Quero provar']||0);
  var taxa=totReac?Math.round(totPos/totReac*100)+'%':'—';
  document.getElementById('gostostats').innerHTML=card(totReac,'reações no total')+card(rcount['Quero provar']||0,'quero provar 🛍️')+card(taxa,'taxa de acerto 💚');
  function gtab(t,c,rows){if(!rows.length)return '';return '<table><tr><th>'+t+'</th><th>'+c+'</th></tr>'+rows.map(function(x){return '<tr><td class="v">'+x[0]+'</td><td>'+x[1]+'</td></tr>';}).join('')+'</table>';}
  var gb=gtab('Peça mais amada','💚',topAma)+gtab('Ocasião mais pedida','looks',topOcc)+gtab('O que as clientes gostam','clientes',topFic);
  document.getElementById('gostobody').innerHTML=gb?('<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;align-items:start;">'+gb+'</div>'):'<div class="empty">Conforme as clientes reagirem aos looks, o gosto da clientela aparece aqui: peças campeãs, ocasiões mais pedidas e preferências.</div>';
  var ck=Object.keys(claims);
  document.getElementById('travas').innerHTML=ck.length?ck.map(function(v){return '<div class="atrow"><span class="who">🔒 '+v+'</span><span>aparelho registrado</span><span class="when">'+fmt(claims[v].ts)+' <button class="btn liberar" data-v="'+v+'" style="margin-left:8px;">Liberar</button></span></div>';}).join(''):'<div class="empty">Nenhum aparelho travado ainda. Quando a vendedora abrir o link dela, o celular fica registrado aqui.</div>';
  document.querySelectorAll('.liberar').forEach(function(b){b.onclick=async function(){if(!confirm('Liberar '+b.dataset.v+'? Ela poderá registrar um novo celular ao abrir o link de novo.'))return;try{await fetch('/claim/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({vend:b.dataset.v})});}catch(e){}carregar();};});
}
function renderFichas(term){term=(term||'').trim().toLowerCase();var fs=(window._fichas||[]).filter(function(f){return !term||((f.vend||'')+' '+(f.cliente||'')).toLowerCase().includes(term);});fs.sort(function(a,b){return ((a.vend||'')+(a.cliente||'')).localeCompare((b.vend||'')+(b.cliente||''));});var el=document.getElementById('fichas');if(!el)return;if(!fs.length){el.innerHTML='<div class="empty">Nenhuma ficha de cliente ainda. Conforme as vendedoras preenchem as fichas, elas aparecem aqui (em silêncio).</div>';return;}el.innerHTML='<div class="ficgrid">'+fs.map(function(f){return '<div class="ficard">'+(f.foto?'<img src="'+f.foto+'">':'<div class="ficnoimg">sem<br>foto</div>')+'<div class="ficbody"><div class="ficnome">'+(f.cliente||'cliente')+'</div><div class="ficvend">'+(f.vend||'—')+'</div><div class="ficmeta">'+[(f.manequim?'Mnq '+f.manequim:''),(f.sapato?'Calç '+f.sapato:''),(f.aniversario?'🎂 '+f.aniversario:'')].filter(Boolean).join(' · ')+'</div>'+(f.telefone?'<div class="ficmeta">📞 '+f.telefone+'</div>':'')+(f.ocasioes?'<div class="ficmeta">💛 '+f.ocasioes+'</div>':'')+(f.notas?'<div class="ficnota">'+f.notas+'</div>':'')+'</div></div>';}).join('')+'</div>';}
var _bc=document.getElementById('buscacli');if(_bc)_bc.oninput=function(){renderFichas(this.value);};
document.getElementById('reload').onclick=carregar;
carregar();
</script>
</body>
</html>
